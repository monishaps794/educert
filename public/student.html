<!-- student.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student - Certificate Application</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>Student Certificate Application</h1>
</header>

<div class="container">
  <!-- Login Section -->
<div id="login-section">
  <h2>Student Login (OTP)</h2>

  <form id="otp-form">
    <label>Email</label>
    <input type="email" id="login-email" required />

    <button type="button" id="send-otp-btn">Send OTP</button>

    <div id="otp-box" class="hidden">
      <label>Enter OTP</label>
      <input type="text" id="otp" maxlength="6" />
      <button type="submit">Verify & Continue</button>
    </div>
  </form>

  <div id="login-message"></div>
</div>



  <!-- Application Section -->
  <div id="application-section" class="hidden">
    <h2>Apply for Certificate</h2>
    <p id="welcome-text"></p>

    <form id="application-form">
      <label>Certificate Type</label>
      <select id="certificate-type" required></select>

      <!-- OTHER CERTIFICATE DETAILS -->
      <div id="other-fields" class="hidden">
        <label>Reason</label>
        <input type="text" id="other-reason" />

        <label>Description</label>
        <textarea id="other-description"></textarea>
      </div>

      <label>Copy Type</label>
      <select id="copy-type" required>
        <option value="">Select</option>
        <option value="Hardcopy">Hardcopy</option>
        <option value="Softcopy">Softcopy</option>
        <option value="Both">Both</option>
      </select>

      <label>Number of Copies</label>
      <input type="number" id="copies" min="1" value="1" required />

      <button type="submit">Proceed & Pay</button>
    </form>

    <div id="application-message"></div>
  </div>
</div>

<script src="student.js"></script>
</body>
</html>
